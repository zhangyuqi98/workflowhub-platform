services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ../.env.staging.example
    volumes:
      - workflowhub-staging-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  workflowhub:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env.staging.example
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/ready | grep '\"status\":\"ready\"' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  workflowhub-staging-postgres:
